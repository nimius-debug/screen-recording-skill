<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif;
         background: #f4f5f7; color: #111; }
  header { background: #1e293b; color: #fff; padding: 18px 28px; font-size: 22px; font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 40px; }
  .card { background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
          cursor: pointer; transition: transform .1s; }
  .card:active { transform: scale(.97); }
  .card h3 { margin: 0 0 8px; }
  .btn { display: inline-block; margin: 30px 40px; padding: 14px 26px; border: none; border-radius: 10px;
         background: #4f46e5; color: #fff; font-size: 16px; cursor: pointer; }
  #out { padding: 0 40px 40px; font-size: 18px; color: #4f46e5; min-height: 30px; }
</style>
</head>
<body>
  <header>Demo Dashboard</header>
  <div class="grid">
    <div class="card" id="card-1" onclick="pick('Analytics')"><h3>Analytics</h3><p>View traffic and conversion.</p></div>
    <div class="card" id="card-2" onclick="pick('Billing')"><h3>Billing</h3><p>Manage your subscription.</p></div>
    <div class="card" id="card-3" onclick="pick('Settings')"><h3>Settings</h3><p>Configure your workspace.</p></div>
  </div>
  <button class="btn" id="action" onclick="pick('Action run!')">Run action</button>
  <div id="out"></div>
  <script>
    function pick(name) { document.getElementById('out').textContent = 'Selected: ' + name; }
  </script>
</body>
</html>
